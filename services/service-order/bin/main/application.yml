server:
  port: 8082

spring:
  application:
    name: service-order
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Base URL of the user service (for cross-service calls if needed)
services:
  user-service:
    url: http://localhost:8081
